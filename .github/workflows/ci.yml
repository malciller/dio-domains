name: ci
on: [push, pull_request]

jobs:
  build-test:
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Prep system deps for OCaml action
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
               bubblewrap darcs g++-multilib gcc-multilib m4 make mercurial \
               musl-tools rsync autoconf automake libtool

      - name: Build libsecp256k1 with schnorrsig support
        run: |
          git clone https://github.com/bitcoin-core/secp256k1.git /tmp/secp256k1
          cd /tmp/secp256k1
          ./autogen.sh
          ./configure --enable-module-schnorrsig --enable-module-recovery
          make
          sudo make install
          sudo ldconfig

      - uses: ocaml/setup-ocaml@v2
        with:
          ocaml-compiler: '5.2.0'
          dune-cache: false # Disable built-in dune cache

      - name: Restore Dune cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/dune
          key: ${{ runner.os }}-dune-cache-${{ hashFiles('**/*.opam', 'dune-project', 'dune') }}
          restore-keys: |
            ${{ runner.os }}-dune-cache-

      - name: Install opam deps
        run: opam install . --deps-only --with-test -y

      - name: Build
        run: opam exec -- dune build @all

      - name: Run tests
        run: opam exec -- dune runtest