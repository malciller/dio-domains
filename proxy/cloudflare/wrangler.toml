name = "lighter-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Durable Object bindings
[[durable_objects.bindings]]
name = "LIGHTER_PROXY"
class_name = "LighterProxy"

# Durable Object migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["LighterProxy"]

# Observability — persist logs on every invocation
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1


# Pin worker entrypoint to Asia-East (matches DO locationHint "apac")
[placement]
mode = "targeted"
region = "gcp:asia-east1"